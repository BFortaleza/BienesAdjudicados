<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienes Adjudicados - Banco Fortaleza S.A.</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --brand-orange: #f26522;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #020617;
            margin: 0;
            overflow: hidden; /* Evita scrolls fantasma */
        }

        /* Pantalla de carga */
        #loader {
            position: fixed;
            inset: 0;
            background-color: #020617;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease-out, visibility 0.5s ease-out;
        }

        .pulse-logo {
            animation: pulse-elegant 1.5s infinite alternate;
        }
        
        @keyframes pulse-elegant {
            0% { transform: scale(0.95); opacity: 0.8; }
            100% { transform: scale(1.05); opacity: 1; filter: drop-shadow(0 0 15px rgba(255,255,255,0.15)); }
        }

        /* Fondo Parallax - VERSIÓN A PRUEBA DE FALLOS (Viewport units y Fixed) */
        .parallax-bg {
            position: fixed; /* Se ancla a la pantalla, no a los contenedores */
            top: -10%; 
            left: -10%;
            width: 120vw; /* 120% del ancho de la pantalla (mucho margen de seguridad) */
            height: 120vh; /* 120% del alto de la pantalla */
            background-image: url('https://i.ibb.co/9kpPs8Sx/FONFO-LEADS2.webp');
            background-size: cover;
            background-position: center;
            z-index: -2;
            pointer-events: none; /* Evita interferencia del ratón */
            will-change: transform; /* Optimiza para la tarjeta de video */
            transition: transform 0.1s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        /* Overlay Full-Screen */
        .overlay {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at center, rgba(15, 23, 42, 0.7) 0%, rgba(2, 6, 23, 0.98) 100%);
            z-index: -1;
            pointer-events: none;
        }

        /* Botones Tecnológicos Flotantes y Sobrios */
        .btn-floating {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        
        .btn-floating:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(242, 101, 34, 0.5);
            box-shadow: 0 10px 25px -10px rgba(0, 0, 0, 0.5), 0 0 15px -5px rgba(242, 101, 34, 0.15);
        }

        .btn-floating::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.04), transparent);
            transform: skewX(-20deg);
            transition: all 0.6s ease;
        }

        .btn-floating:hover::after {
            left: 150%;
        }

        /* Título Metálico Refinado */
        .text-metallic {
            background: linear-gradient(to bottom right, #ffffff 30%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 20px rgba(0,0,0,0.8);
        }

        #content-layer {
            transition: transform 0.1s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            animation: fadeUp 0.8s ease-out 0.2s both;
        }

        /* Animación de entrada premium */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="text-white antialiased">

    <!-- 1. VISTA MÓVIL RESTRINGIDA (< 768px) -->
    <div class="fixed inset-0 bg-[#020617] flex flex-col justify-center items-center p-8 text-center z-[10000] md:hidden">
        <img src="https://i.ibb.co/rRSQzDmq/logo-qr.png" alt="Elefante Banco Fortaleza" class="w-24 opacity-90 mb-8 pulse-logo">
        <h1 class="text-xl font-bold tracking-widest text-white border-b border-white/20 pb-4">VISTA MÓVIL <br> NO PERMITIDA</h1>
        <p class="mt-4 text-slate-400 text-sm max-w-xs mx-auto">Por favor, acceda a este sistema desde una computadora de escritorio.</p>
    </div>

    <!-- FONDOS Y EFECTOS INDEPENDIENTES (Fuera del contenedor para evitar bugs de flexbox) -->
    <div class="parallax-bg hidden md:block" id="bg-layer"></div>
    <div class="overlay hidden md:block"></div>

    <!-- 2. APLICACIÓN DE ESCRITORIO (>= 768px) -->
    <!-- Contenedor maestro con padding estricto para forzar márgenes -->
    <div class="relative w-full h-screen hidden md:flex items-center justify-center p-8 lg:p-16">
        
        <!-- PANTALLA DE CARGA (0.5s) -->
        <div id="loader">
            <img src="https://i.ibb.co/rRSQzDmq/logo-qr.png" alt="Cargando..." class="w-24 pulse-logo">
        </div>

        <!-- CONTENIDO CENTRAL PERFECTAMENTE AGRUPADO -->
        <!-- max-w-2xl asegura que nunca se expanda demasiado a lo ancho -->
        <div id="content-layer" class="w-full max-w-2xl z-10 flex flex-col items-center">
            
            <!-- Logo superior proporcionado -->
            <img src="https://i.ibb.co/8yB0N1b/logo-blanco.png" alt="Banco Fortaleza S.A." class="h-10 lg:h-12 object-contain opacity-95 mb-10">

            <!-- Título Sobrio y Elegante -->
            <h1 class="text-2xl md:text-3xl font-extrabold mb-10 text-metallic text-center tracking-[0.15em]">
                BIENES ADJUDICADOS
            </h1>

            <!-- Grupo de Botones -->
            <div class="w-full flex flex-col space-y-4">
                
                <!-- Link 1 -->
                <a href="https://docs.google.com/spreadsheets/d/1QIZaJKkt34VZmo3JS-41cWYNnNykxVCz2X2tXfJUUSY/edit?usp=sharing" target="_blank" class="btn-floating group rounded-xl p-4 flex items-center justify-between cursor-pointer no-underline">
                    <div class="flex items-center space-x-4">
                        <div class="w-10 h-10 rounded-lg bg-white/5 flex items-center justify-center group-hover:bg-[#f26522]/20 transition-colors border border-white/5 group-hover:border-[#f26522]/30 shadow-inner">
                            <svg class="w-5 h-5 text-slate-300 group-hover:text-[#f26522] transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg>
                        </div>
                        <span class="font-medium text-sm md:text-[14px] tracking-wide text-slate-300 group-hover:text-white transition-colors">1. CONTROL DE BIENES PUBLICADOS</span>
                    </div>
                    <svg class="w-5 h-5 text-slate-500 group-hover:text-[#f26522] transform group-hover:translate-x-1 transition-all" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5l7 7-7 7"></path></svg>
                </a>

                <!-- Link 2 -->
                <a href="https://docs.google.com/spreadsheets/d/1UF9ETpzxlgDgR6kG10ORRj5x-hDkQ5jyxw2EhZVDP04/edit?usp=sharing" target="_blank" class="btn-floating group rounded-xl p-4 flex items-center justify-between cursor-pointer no-underline">
                    <div class="flex items-center space-x-4">
                        <div class="w-10 h-10 rounded-lg bg-white/5 flex items-center justify-center group-hover:bg-[#f26522]/20 transition-colors border border-white/5 group-hover:border-[#f26522]/30 shadow-inner">
                            <svg class="w-5 h-5 text-slate-300 group-hover:text-[#f26522] transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        </div>
                        <span class="font-medium text-sm md:text-[14px] tracking-wide text-slate-300 group-hover:text-white transition-colors">2. CONTROL DE VENTAS</span>
                    </div>
                    <svg class="w-5 h-5 text-slate-500 group-hover:text-[#f26522] transform group-hover:translate-x-1 transition-all" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5l7 7-7 7"></path></svg>
                </a>

                <!-- Link 3 -->
                <a href="https://docs.google.com/spreadsheets/d/1rA5UwTQPjMtxKdkhh8QOqnDRBtqcZt06Cf-jpwW6_ME/edit?usp=sharing" target="_blank" class="btn-floating group rounded-xl p-4 flex items-center justify-between cursor-pointer no-underline">
                    <div class="flex items-center space-x-4">
                        <div class="w-10 h-10 rounded-lg bg-white/5 flex items-center justify-center group-hover:bg-[#f26522]/20 transition-colors border border-white/5 group-hover:border-[#f26522]/30 shadow-inner">
                            <svg class="w-5 h-5 text-slate-300 group-hover:text-[#f26522] transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4"></path></svg>
                        </div>
                        <span class="font-medium text-sm md:text-[14px] tracking-wide text-slate-300 group-hover:text-white transition-colors">3. BASE DE DATOS</span>
                    </div>
                    <svg class="w-5 h-5 text-slate-500 group-hover:text-[#f26522] transform group-hover:translate-x-1 transition-all" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5l7 7-7 7"></path></svg>
                </a>
                
            </div>
        </div>

        <!-- Footer Absoluto en la base (Estilo Corporativo Premium) -->
        <div class="absolute bottom-6 w-full text-center z-10 px-4">
            <p class="text-[10px] text-slate-500/70 tracking-[0.15em] font-light uppercase">
                &copy; 2026 Banco Fortaleza S.A. <span class="mx-2 text-slate-600/50">|</span> Todos los derechos reservados
            </p>
        </div>
    </div>

    <script>
        // Pantalla de carga exacta
        window.addEventListener('load', () => {
            const loader = document.getElementById('loader');
            setTimeout(() => {
                loader.style.opacity = '0';
                loader.style.visibility = 'hidden';
                setTimeout(() => { loader.style.display = 'none'; }, 500); 
            }, 500);
        });

        // Parallax solucionado con translate3d (Hardware Acceleration)
        document.addEventListener('mousemove', (e) => {
            if (window.innerWidth < 768) return; 

            const xAxis = (window.innerWidth / 2 - e.pageX) / 50;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 50;
            
            const bgLayer = document.getElementById('bg-layer');
            const contentLayer = document.getElementById('content-layer');

            // translate3d evita el tearing (desgarro visual) forzando el uso de la GPU
            bgLayer.style.transform = `translate3d(${xAxis}px, ${yAxis}px, 0)`;
            contentLayer.style.transform = `translate3d(${xAxis * -0.15}px, ${yAxis * -0.15}px, 0)`;
        });

        document.addEventListener('mouseleave', () => {
            const bgLayer = document.getElementById('bg-layer');
            const contentLayer = document.getElementById('content-layer');
            bgLayer.style.transform = `translate3d(0px, 0px, 0)`;
            contentLayer.style.transform = `translate3d(0px, 0px, 0)`;
        });
    </script>
</body>
</html>
